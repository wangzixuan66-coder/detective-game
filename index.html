<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一分钟破案 - 推理小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #eee;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        header p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        /* 游戏统计 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
        }

        /* 页面切换 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 首页样式 */
        .home-content {
            text-align: center;
            padding: 40px 20px;
        }

        .case-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .case-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .case-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .case-card.solved {
            border-color: #4ecca3;
        }

        .case-card.solved::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4ecca3;
            color: #1a1a2e;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .case-number {
            color: #e94560;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .case-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .case-difficulty {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }

        .difficulty-easy { background: #4ecca3; color: #1a1a2e; }
        .difficulty-medium { background: #f4d03f; color: #1a1a2e; }
        .difficulty-hard { background: #e94560; color: white; }

        /* 游戏页面样式 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
            background: rgba(233, 69, 96, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .timer.warning {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .case-content {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .case-content h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .case-description {
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            border-left: 3px solid #e94560;
        }

        /* 线索区域 - 新设计 */
        .clues-section {
            margin-top: 25px;
        }

        .clues-section h3 {
            color: #f4d03f;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .clues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .clue-card {
            background: rgba(244, 208, 63, 0.1);
            border: 1px solid rgba(244, 208, 63, 0.3);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .clue-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(244, 208, 63, 0.2);
        }

        .clue-card.revealed .clue-icon {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .clue-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 10px;
            display: block;
        }

        .clue-text {
            font-size: 0.95rem;
            text-align: center;
            color: #fff;
        }

        .clue-label {
            font-size: 0.8rem;
            color: #f4d03f;
            text-align: center;
            margin-bottom: 5px;
        }

        /* 线索详情弹窗 */
        .clue-detail {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .clue-detail.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .clue-detail-content {
            background: linear-gradient(135deg, #2a2a4a 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 2px solid rgba(244, 208, 63, 0.3);
            position: relative;
        }

        .clue-detail-icon {
            font-size: 6rem;
            margin-bottom: 20px;
        }

        .clue-detail-title {
            font-size: 1.5rem;
            color: #f4d03f;
            margin-bottom: 15px;
        }

        .clue-detail-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ddd;
            margin-bottom: 20px;
        }

        .clue-detail-close {
            background: rgba(244, 208, 63, 0.2);
            border: 1px solid rgba(244, 208, 63, 0.5);
            color: #f4d03f;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .clue-detail-close:hover {
            background: rgba(244, 208, 63, 0.3);
        }

        /* 物证展示区 */
        .evidence-board {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 2px dashed rgba(255,255,255,0.1);
        }

        .evidence-board h4 {
            color: #888;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .evidence-items {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .evidence-item {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .evidence-item:hover {
            border-color: #e94560;
            transform: scale(1.1);
        }

        /* 问题区域 */
        .question-section {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-section h3 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .option-btn:hover {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
        }

        .option-btn.correct {
            background: rgba(78, 204, 163, 0.3);
            border-color: #4ecca3;
        }

        .option-btn.wrong {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* 结果弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .modal-message {
            color: #aaa;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            background: #ff6b6b;
        }

        /* 解析区域 */
        .explanation {
            background: rgba(78, 204, 163, 0.1);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .explanation h4 {
            color: #4ecca3;
            margin-bottom: 10px;
        }

        /* 场景重现 */
        .scene-replay {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .scene-title {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .scene-visual {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #ccc;
            font-family: monospace;
            white-space: pre;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .case-grid {
                grid-template-columns: 1fr;
            }
            
            .timer {
                font-size: 1.5rem;
            }

            .clues-grid {
                grid-template-columns: 1fr 1fr;
            }

            .clue-detail-content {
                padding: 25px;
            }

            .clue-detail-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 一分钟破案</h1>
            <p>观察细节，推理真相，你能在60秒内破解谜题吗？</p>
        </header>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="solved-count">0</div>
                <div class="stat-label">已破案</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-cases">0</div>
                <div class="stat-label">总案件</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="success-rate">0%</div>
                <div class="stat-label">成功率</div>
            </div>
        </div>

        <!-- 首页 -->
        <div class="page active" id="home-page">
            <div class="home-content">
                <p style="color: #888; margin-bottom: 10px;">选择下方案件开始推理，每个案件限时60秒</p>
                <div class="case-grid" id="case-grid"></div>
            </div>
        </div>

        <!-- 游戏页面 -->
        <div class="page" id="game-page">
            <div class="game-header">
                <button class="back-btn" onclick="goHome()">← 返回案件列表</button>
                <div class="timer" id="timer">60</div>
            </div>
            
            <div class="case-content">
                <h2 id="case-title"></h2>
                <div class="case-description" id="case-description"></div>
                
                <!-- 场景重现 -->
                <div class="scene-replay" id="scene-replay" style="display: none;">
                    <div class="scene-title">📍 案发现场示意图</div>
                    <div class="scene-visual" id="scene-visual"></div>
                </div>

                <!-- 线索区 -->
                <div class="clues-section">
                    <h3>🔑 点击线索卡片查看详情</h3>
                    <div class="clues-grid" id="clues-container"></div>
                </div>

                <!-- 物证板 -->
                <div class="evidence-board">
                    <h4>📦 物证收集</h4>
                    <div class="evidence-items" id="evidence-container"></div>
                </div>
            </div>

            <div class="question-section">
                <h3>❓ 问题</h3>
                <p id="question-text" style="margin-bottom: 20px; font-size: 1.1rem;"></p>
                <div class="options-list" id="options-container"></div>
            </div>

            <div class="explanation" id="explanation">
                <h4>💡 答案解析</h4>
                <p id="explanation-text"></p>
            </div>
        </div>
    </div>

    <!-- 线索详情弹窗 -->
    <div class="clue-detail" id="clue-detail" onclick="closeClueDetail(event)">
        <div class="clue-detail-content" onclick="event.stopPropagation()">
            <div class="clue-detail-icon" id="clue-detail-icon"></div>
            <div class="clue-detail-title" id="clue-detail-title"></div>
            <div class="clue-detail-desc" id="clue-detail-desc"></div>
            <button class="clue-detail-close" onclick="closeClueDetail()">关闭</button>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-icon" id="modal-icon">🎉</div>
            <h2 class="modal-title" id="modal-title">破案成功！</h2>
            <p class="modal-message" id="modal-message"></p>
            <button class="modal-btn" onclick="closeModal()">继续</button>
        </div>
    </div>

    <script>
        // 游戏数据 - 带图片线索
        const cases = [
            {
                id: 1,
                title: "午夜琴声",
                difficulty: "easy",
                description: "一栋公寓楼的住户报警称，每晚午夜都能听到楼上传来钢琴声，但楼上住户坚称自己从不在家弹钢琴。警方调查后发现，楼上住户确实不在家，但钢琴上却有一些奇怪的痕迹。",
                scene: `
    🏢 公寓大楼
    ┌─────────────────┐
    │  🏠 楼上住户    │ ← 钢琴 🎹
    │     (不在家)    │    💧 水渍
    ├─────────────────┤
    │  🏠 报案住户    │ ← 猫 🐱
    │   (听到琴声)    │
    └─────────────────┘
                `,
                clues: [
                    { icon: "💧", label: "水渍", text: "钢琴上有奇怪的水渍", detail: "钢琴键盘上有几处水渍，看起来像是液体洒落不久。水渍形状不规则，不像是有意泼洒的。" },
                    { icon: "🪟", label: "窗户", text: "窗户微微敞开", detail: "客厅窗户开了一条缝，大约5厘米宽，足够一只小动物通过。" },
                    { icon: "🐱", label: "猫", text: "楼下住户的猫", detail: "楼下住户养了一只橘猫，经常在午夜时分躁动不安。" },
                    { icon: "🎹", label: "钢琴", text: "斯坦威钢琴", detail: "一架黑色的三角钢琴，琴键上有一些细微的抓痕。" }
                ],
                evidence: ["🔑 钥匙", "📷 照片", "📝 报案记录"],
                question: "钢琴声是如何产生的？",
                options: [
                    "楼上住户在说谎",
                    "楼下的猫跳上钢琴踩到了琴键",
                    "有幽灵在弹琴",
                    "是隔壁传来的声音"
                ],
                correct: 1,
                explanation: "正确答案是B。楼下住户的猫通过敞开的窗户进入房间，午夜时分跳上钢琴玩耍，不小心踩到了琴键发出声音。水渍是猫喝水时打翻的水杯造成的。"
            },
            {
                id: 2,
                title: "消失的名画",
                difficulty: "easy",
                description: "博物馆里一幅价值连城的名画被盗。案发当晚只有三名工作人员在场：保安老王、清洁工李阿姨和策展人张经理。监控显示当晚没有人进出藏画室，但画却不见了。",
                scene: `
    🏛️ 博物馆藏画室
    ┌─────────────────────┐
    │  🖼️ 名画位置        │
    │  (画「消失」了)       │
    │                     │
    │  ❄️ 空调: 16°C      │
    │  🧊 地面有冰晶      │
    └─────────────────────┘
    工作人员: 👮老王  🧹李阿姨  👔张经理
                `,
                clues: [
                    { icon: "❄️", label: "低温", text: "藏画室温度异常低", detail: "温度计显示室温只有16°C，比正常温度低了10度。空调全功率运转。" },
                    { icon: "🧊", label: "冰晶", text: "地上的细小冰晶", detail: "地板上有一些闪烁的小冰晶，踩上去会发出咯吱声。" },
                    { icon: "🎨", label: "特殊颜料", text: "名画使用特殊颜料", detail: "这幅画的颜料含有热敏材料，在低温下会变成透明色。" },
                    { icon: "📦", label: "冷藏库", text: "第二天画在冷藏库发现", detail: "第二天温度回升后，画在博物馆的冷藏库里被找到，是策展人「借用」了冷藏库。" }
                ],
                evidence: ["📹 监控", "🌡️ 温度计", "📋 工作记录"],
                question: "画是怎么'消失'的？",
                options: [
                    "有人用隐形斗篷把画藏起来",
                    "画被冻住后缩小，从通风口掉了下去",
                    "其实画还在原地，只是颜料遇冷变色让人看不见",
                    "画被调包了"
                ],
                correct: 2,
                explanation: "正确答案是C。这幅画使用的特殊颜料在低温下会变透明。有人调低了空调温度，导致画'消失'。第二天温度回升后，在冷藏库里发现了画。"
            },
            {
                id: 3,
                title: "密室谋杀",
                difficulty: "medium",
                description: "一名男子被发现死在反锁的公寓里。门窗都从内部锁死，钥匙在死者口袋里。死者是中毒身亡，现场没有发现毒药瓶。唯一的可疑之处是桌上有一杯喝了一半的咖啡和一个冰块托盘。",
                scene: `
    🔒 密室现场
    ┌──────────────────┐
    │  🚪 门(反锁)     │
    │  🪟 窗(内锁)     │

        function init() {
            console.log('游戏初始化开始...');
            try {
                loadProgress();
                renderCaseGrid();

                console.log('游戏初始化完成！');
            } catch (e) {
                console.error('初始化出错:', e);
                alert('游戏加载出错，请刷新页面重试！');
            }
        }

        // 加载进度
        function loadProgress() {
            const saved = localStorage.getItem('detectiveGameProgress');
            if (saved) {
                solvedCases = new Set(JSON.parse(saved));
            }
        }

        // 保存进度
        function saveProgress() {
            localStorage.setItem('detectiveGameProgress', JSON.stringify([...solvedCases]));
        }

        // 更新统计
        function updateStats() {
            document.getElementById('solved-count').textContent = solvedCases.size;
            document.getElementById('total-cases').textContent = cases.length;
            const rate = cases.length > 0 ? Math.round((solvedCases.size / cases.length) * 100) : 0;
            document.getElementById('success-rate').textContent = rate + '%';
        }

        // 渲染案件列表
        function renderCaseGrid() {
            const grid = document.getElementById('case-grid');
            if (!grid) {
                console.error('找不到案件列表容器!');
                return;
            }
            if (!cases || cases.length === 0) {
                console.error('案件数据为空!');
                return;
            }
            grid.innerHTML = cases.map(c => `
                <div class="case-card ${solvedCases.has(c.id) ? 'solved' : ''}" onclick="startCase(${c.id})">
                    <div class="case-number">案件 #${c.id}</div>
                    <div class="case-title">${c.title}</div>
                    <span class="case-difficulty difficulty-${c.difficulty}">
                        ${c.difficulty === 'easy' ? '简单' : c.difficulty === 'medium' ? '中等' : '困难'}
                    </span>
                </div>
            `).join('');
            console.log(`已渲染 ${cases.length} 个案件`);
        }

        // 开始案件
        function startCase(caseId) {
            currentCase = cases.find(c => c.id === caseId);
            if (!currentCase) return;

            // 重置
            revealedClues.clear();
            document.getElementById('explanation').classList.remove('show');

            // 填充案件内容
            document.getElementById('case-title').textContent = currentCase.title;
            document.getElementById('case-description').textContent = currentCase.description;
            
            // 场景重现
            const sceneReplay = document.getElementById('scene-replay');
            const sceneVisual = document.getElementById('scene-visual');
            if (currentCase.scene) {
                sceneVisual.textContent = currentCase.scene;
                sceneReplay.style.display = 'block';
            } else {
                sceneReplay.style.display = 'none';
            }
            
            // 填充线索卡片
            const cluesContainer = document.getElementById('clues-container');
            cluesContainer.innerHTML = currentCase.clues.map((clue, idx) => `
                <div class="clue-card" onclick="showClueDetail(${idx})" id="clue-${idx}">
                    <div class="clue-label">线索 ${idx + 1}</div>
                    <div class="clue-icon">${clue.icon}</div>
                    <div class="clue-text">${clue.label}</div>
                </div>
            `).join('');

            // 填充物证
            const evidenceContainer = document.getElementById('evidence-container');
            evidenceContainer.innerHTML = currentCase.evidence.map(item => `
                <div class="evidence-item" title="${item}">${item.split(' ')[0]}</div>
            `).join('');

            // 填充问题和选项
            document.getElementById('question-text').textContent = currentCase.question;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = currentCase.options.map((opt, idx) => 
                `<button class="option-btn" onclick="selectAnswer(${idx})" id="option-${idx}">${String.fromCharCode(65 + idx)}. ${opt}</button>`
            ).join('');

            // 重置计时器
            timeLeft = 60;
            updateTimerDisplay();

            // 切换页面
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('game-page').classList.add('active');

            // 开始计时
            startTimer();
        }

        // 显示线索详情
        function showClueDetail(clueIdx) {
            const clue = currentCase.clues[clueIdx];
            
            document.getElementById('clue-detail-icon').textContent = clue.icon;
            document.getElementById('clue-detail-title').textContent = clue.label;
            document.getElementById('clue-detail-desc').textContent = clue.detail;
            document.getElementById('clue-detail').classList.add('active');
            
            // 标记为已查看
            if (!revealedClues.has(clueIdx)) {
                revealedClues.add(clueIdx);
                document.getElementById(`clue-${clueIdx}`).classList.add('revealed');
            }
        }

        // 关闭线索详情
        function closeClueDetail(event) {
            if (!event || event.target.id === 'clue-detail' || event.target.classList.contains('clue-detail-close')) {
                document.getElementById('clue-detail').classList.remove('active');
            }
        }

        // 开始计时
        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    timeUp();
                }
            }, 1000);
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = timeLeft;
            if (timeLeft <= 10) {
                timerEl.classList.add('warning');
            } else {
                timerEl.classList.remove('warning');
            }
        }

        // 时间到
        function timeUp() {
            clearInterval(timer);
            showModal('⏰', '时间到！', '很遗憾，你没有在规定时间内破案。再试一次吧！');
        }

        // 选择答案
        function selectAnswer(index) {
            clearInterval(timer);
            
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            const correct = index === currentCase.correct;
            
            if (correct) {
                buttons[index].classList.add('correct');
                solvedCases.add(currentCase.id);
                saveProgress();
                updateStats();
                showModal('🎉', '破案成功！', `恭喜你破解了「${currentCase.title}」！用时${60 - timeLeft}秒。`);
            } else {
                buttons[index].classList.add('wrong');
                buttons[currentCase.correct].classList.add('correct');
                showModal('❌', '破案失败', '很遗憾，答案不正确。看看解析再试一次吧！');
            }

            // 显示解析
            document.getElementById('explanation-text').textContent = currentCase.explanation;
            document.getElementById('explanation').classList.add('show');
        }

        // 显示弹窗
        function showModal(icon, title, message) {
            document.getElementById('modal-icon').textContent = icon;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // 返回首页
        function goHome() {
            clearInterval(timer);
            document.getElementById('game-page').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
            renderCaseGrid();
        }

        // 启动游戏 - 确保DOM加载完成
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
